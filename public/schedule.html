<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwimSync &mdash; Practice Schedule</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="header-top-row">
          <div>
            <h1>&#127946; SwimSync</h1>
            <p class="subtitle">Practice Schedule</p>
          </div>
          <button class="btn btn-secondary" id="btn-logout" type="button">
            Log Out
          </button>
        </div>
        <div class="header-meta-row">
          <span id="db-status" class="badge loading">Connecting&hellip;</span>
          <span id="user-role-badge" class="badge role-badge hidden"></span>
        </div>
      </div>
    </header>

    <div class="page-layout">
      <aside class="site-sidebar-global">
        <h2 class="sidebar-title">Navigation</h2>
        <nav class="sidebar-nav">
          <a href="/app" class="sidebar-link">&#127968; Dashboard</a>
          <a href="/schedule" class="sidebar-link active">&#128197; Schedule</a>
          <a href="/team" class="sidebar-link">&#128101; Team</a>
        </nav>
      </aside>

      <main class="page-main">
        <section class="card hidden" id="sidebar-session-card">
          <div class="card-header">
            <h2>Schedule Builder</h2>
          </div>
          <form id="sidebar-session-form" class="form-grid" autocomplete="off">
            <div class="form-row">
              <label for="sidebar-sel-group">Group</label>
              <select id="sidebar-sel-group" required>
                <option value="">Loading groups&hellip;</option>
              </select>
            </div>
            <div class="form-row">
              <label for="sidebar-sel-date">Start Date</label>
              <input id="sidebar-sel-date" type="date" required />
            </div>
            <div class="form-row">
              <label for="sidebar-sel-start">Start Time</label>
              <input id="sidebar-sel-start" type="time" required />
            </div>
            <div class="form-row">
              <label for="sidebar-sel-end">End Time</label>
              <input id="sidebar-sel-end" type="time" required />
            </div>
            <div class="form-row form-row-full">
              <label for="sidebar-sel-location">Location</label>
              <input id="sidebar-sel-location" type="text" placeholder="Main Pool" />
            </div>
            <div class="form-row form-row-full repeat-group">
              <label class="checkbox-row" for="sidebar-repeat-weekly">
                <input id="sidebar-repeat-weekly" type="checkbox" />
                <span>Repeat weekly until removed by admin</span>
              </label>
            </div>
            <div class="form-row form-row-full hidden" id="sidebar-repeat-days-row">
              <label>Days of Week</label>
              <div class="day-picker-inline">
                <label class="day-checkbox"><input type="checkbox" name="sidebar-repeat-day" value="1" /><span>M</span></label>
                <label class="day-checkbox"><input type="checkbox" name="sidebar-repeat-day" value="2" /><span>T</span></label>
                <label class="day-checkbox"><input type="checkbox" name="sidebar-repeat-day" value="3" /><span>W</span></label>
                <label class="day-checkbox"><input type="checkbox" name="sidebar-repeat-day" value="4" /><span>Th</span></label>
                <label class="day-checkbox"><input type="checkbox" name="sidebar-repeat-day" value="5" /><span>F</span></label>
                <label class="day-checkbox"><input type="checkbox" name="sidebar-repeat-day" value="6" /><span>Sa</span></label>
                <label class="day-checkbox"><input type="checkbox" name="sidebar-repeat-day" value="0" /><span>Su</span></label>
              </div>
            </div>
            <div id="sidebar-session-error" class="state-msg error hidden form-row-full"></div>
            <div class="form-row form-row-full">
              <button class="btn btn-primary" type="submit" id="btn-sidebar-add-session">Add Session(s)</button>
            </div>
          </form>
        </section>

        <section class="card hidden" id="sidebar-group-card">
          <div class="card-header">
            <h2>Create Practice Group</h2>
          </div>
          <form id="sidebar-group-form" class="form-grid" autocomplete="off">
            <div class="form-row">
              <label for="sidebar-group-name">Name</label>
              <input id="sidebar-group-name" type="text" placeholder="e.g. Junior 3" required />
            </div>
            <div class="form-row">
              <label for="sidebar-group-level">Level</label>
              <input id="sidebar-group-level" type="text" placeholder="e.g. Advanced" />
            </div>
            <div id="sidebar-group-error" class="state-msg error hidden form-row-full"></div>
            <div class="form-row form-row-full">
              <button class="btn btn-primary" type="submit" id="btn-sidebar-add-group">Create Group</button>
            </div>
          </form>
        </section>

        <!-- Schedule table -->
        <section class="card">
          <div class="card-header">
            <h2>Upcoming Practice Sessions</h2>
            <div class="card-header-actions">
              <div class="date-button-wrap">
                <button class="btn btn-secondary" id="btn-view-date" type="button">Select Date</button>
                <input id="view-date" class="date-button-input" type="date" aria-label="Filter by day" />
              </div>
              <button class="btn btn-secondary" id="btn-clear-date" type="button">All Days</button>
              <button class="btn btn-secondary" id="btn-refresh">&#8635; Refresh</button>
            </div>
          </div>
        <div id="schedule-loading" class="state-msg">
          Loading schedule&hellip;
        </div>
        <div id="schedule-error" class="state-msg error hidden"></div>
        <div id="schedule-empty" class="state-msg hidden">
          No sessions scheduled yet.
        </div>
        <div class="table-wrap">
          <table id="schedule-table" class="hidden">
            <thead>
              <tr>
                <th>#</th>
                <th>Date</th>
                <th>Group</th>
                <th>Level</th>
                <th>Start</th>
                <th>End</th>
                <th>Location</th>
                <th id="sched-action-heading">Action</th>
              </tr>
            </thead>
            <tbody id="schedule-tbody"></tbody>
          </table>
        </div>
      </section>
      </main>
    </div>

    <script src="schedule.js"></script>
  </body>
</html>
