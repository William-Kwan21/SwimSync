<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwimSync &mdash; Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-top-row">
        <div>
          <h1>&#127946; SwimSync</h1>
          <p class="subtitle">Swim Management System &mdash; Login + RBAC Demo</p>
        </div>
        <button class="btn btn-secondary" id="btn-logout" type="button">Log Out</button>
      </div>
      <div class="header-meta-row">
        <span id="db-status" class="badge loading">Connecting&hellip;</span>
        <span id="user-role-badge" class="badge role-badge hidden"></span>
      </div>
    </div>
  </header>

  <nav class="site-nav">
    <div class="site-nav-inner">
      <a href="/app" class="nav-link active">&#127968; Dashboard</a>
      <a href="/schedule" class="nav-link">&#128197; Schedule</a>
      <a href="/team" class="nav-link">&#128101; Team</a>
    </div>
  </nav>

  <main>
    <section class="card user-summary-card">
      <div class="card-header">
        <h2>Signed-in User</h2>
      </div>
      <div class="summary-grid">
        <div>
          <p class="summary-label">Name</p>
          <p id="current-user-name" class="summary-value">Loading&hellip;</p>
        </div>
        <div>
          <p class="summary-label">Email</p>
          <p id="current-user-email" class="summary-value">Loading&hellip;</p>
        </div>
        <div>
          <p class="summary-label">Role</p>
          <p id="current-user-role" class="summary-value">Loading&hellip;</p>
        </div>
      </div>
      <div id="role-description" class="state-msg info">Checking role permissions&hellip;</div>
    </section>

    <section id="add-user-card" class="card hidden">
      <div class="card-header">
        <h2>Add User</h2>
      </div>

      <form id="add-user-form" class="form-grid" autocomplete="off">
        <div class="form-row">
          <label for="new-user-name">Name</label>
          <input id="new-user-name" name="name" type="text" required />
        </div>

        <div class="form-row">
          <label for="new-user-email">Email</label>
          <input id="new-user-email" name="email" type="email" required />
        </div>

        <div class="form-row">
          <label for="new-user-password">Password</label>
          <input id="new-user-password" name="password" type="password" minlength="8" required />
        </div>

        <div class="form-row">
          <label for="new-user-role">Role</label>
          <select id="new-user-role" name="role" required>
            <option value="swimmer">Swimmer</option>
            <option value="parent">Parent</option>
            <option value="coach">Coach</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="form-row form-row-full">
          <button class="btn btn-primary" id="btn-add-user" type="submit">Add User</button>
        </div>
      </form>

      <div id="add-user-status" class="state-msg hidden"></div>
    </section>

    <!-- Phase 1 – retrieve and display dummy records -->
    <section class="card">
      <div class="card-header">
        <h2 id="users-section-title">Users in Database</h2>
        <button class="btn btn-secondary" id="btn-refresh">&#8635; Refresh</button>
      </div>

      <div id="users-loading" class="state-msg">Loading records&hellip;</div>
      <div id="users-error" class="state-msg error hidden"></div>
      <div id="users-empty" class="state-msg hidden">No users found.</div>

      <div class="table-wrap">
        <table id="users-table" class="hidden">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Created</th>
              <th id="action-column-heading">Action</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
