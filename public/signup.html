<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwimSync Sign Up</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-brand">
        <p class="eyebrow">SwimSync</p>
        <h1>Create your family account</h1>
        <p class="auth-copy">Create the parent login once, then add one or more swimmer profiles that stay linked to that parent account. Each swimmer gets their own SwimSync login and remains connected to the parent family account.</p>
      </div>

      <form id="signup-form" class="auth-form" autocomplete="off">
        <div class="form-row form-row-full" style="margin-bottom: 0.25rem;">
          <strong>Parent account</strong>
        </div>
        <div class="form-row">
          <label for="signup-parent-name">Parent full name</label>
          <input id="signup-parent-name" type="text" placeholder="Parent full name" required />
        </div>
        <div class="form-row">
          <label for="signup-parent-email">Parent email</label>
          <input id="signup-parent-email" type="email" placeholder="parent@example.com" required />
        </div>
        <div class="form-row">
          <label for="signup-parent-password">Parent password</label>
          <input id="signup-parent-password" type="password" placeholder="At least 8 characters" minlength="8" required />
        </div>
        <div class="form-row">
          <label for="signup-parent-address">Parent address</label>
          <input id="signup-parent-address" type="text" placeholder="Street, City, State" required />
        </div>

        <div class="form-row form-row-full" style="margin-top: 0.5rem; margin-bottom: 0.25rem; display:flex; align-items:center; justify-content:space-between; gap:1rem;">
          <strong>Swimmer profiles</strong>
          <button class="btn btn-secondary" id="btn-add-swimmer" type="button">Add another swimmer</button>
        </div>
        <div id="signup-swimmers"></div>

        <div id="signup-error" class="state-msg error hidden"></div>
        <div id="signup-success" class="state-msg hidden"></div>

        <button class="btn btn-primary auth-submit" type="submit" id="btn-signup">Create Account</button>
        <a class="btn btn-secondary auth-submit" href="/" style="text-decoration:none; justify-content:center;">Back to Login</a>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
  <script src="ui-theme.js"></script>
  <script src="signup.js"></script>
</body>
</html>
