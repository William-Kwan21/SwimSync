<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwimSync &mdash; Team</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-top-row">
        <div>
          <h1>&#127946; SwimSync</h1>
          <p class="subtitle">Team Information</p>
        </div>
        <button class="btn btn-secondary" id="btn-logout" type="button">Log Out</button>
      </div>
      <div class="header-meta-row">
        <span id="db-status" class="badge loading">Connecting&hellip;</span>
        <span id="user-role-badge" class="badge role-badge hidden"></span>
      </div>
    </div>
  </header>

  <div class="page-layout">
    <aside class="site-sidebar-global">
      <h2 class="sidebar-title">Navigation</h2>
      <nav class="sidebar-nav">
        <a href="/app" class="sidebar-link">&#127968; Dashboard</a>
        <a href="/schedule" class="sidebar-link">&#128197; Schedule</a>
        <a href="/team" class="sidebar-link active">&#128101; Team</a>
      </nav>
    </aside>

    <main class="page-main">
    <div id="team-loading" class="state-msg">Loading team data&hellip;</div>
    <div id="team-error" class="state-msg error hidden"></div>

    <!-- Coaches -->
    <section class="card hidden" id="coaches-card">
      <div class="card-header">
        <h2>
          <svg width="22" height="22" viewBox="0 0 64 64" aria-hidden="true" focusable="false" style="vertical-align: -4px; margin-right: 6px;">
            <rect x="6" y="28" width="28" height="22" rx="3" fill="#a3a3a3" transform="rotate(-35 20 39)" />
            <circle cx="42" cy="30" r="15" fill="#d4d4d4" />
            <rect x="27" y="20" width="10" height="9" rx="2" fill="#1f1b1b" transform="rotate(-35 32 24.5)" />
            <ellipse cx="53" cy="20" rx="7" ry="5" fill="none" stroke="#9a9a9a" stroke-width="3" />
          </svg>
          Coaches
        </h2>
        <span id="coaches-count" class="badge loading">0</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Certification</th>
              <th>Years Exp.</th>
            </tr>
          </thead>
          <tbody id="coaches-tbody"></tbody>
        </table>
      </div>
    </section>

    <!-- Swimmers -->
    <section class="card hidden" id="swimmers-card">
      <div class="card-header">
        <h2>&#127946; Swimmers</h2>
        <span id="swimmers-count" class="badge loading">0</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>DOB</th>
              <th>Gender</th>
              <th>Skill Level</th>
              <th>Group</th>
              <th>Change Group</th>
            </tr>
          </thead>
          <tbody id="swimmers-tbody"></tbody>
        </table>
      </div>
    </section>

    <!-- Parents -->
    <section class="card hidden" id="parents-card">
      <div class="card-header">
        <h2>&#128106; Parents / Guardians</h2>
        <span id="parents-count" class="badge loading">0</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Emergency Contact</th>
            </tr>
          </thead>
          <tbody id="parents-tbody"></tbody>
        </table>
      </div>
    </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
  <script src="ui-theme.js"></script>
  <script src="team.js"></script>
</body>
</html>
